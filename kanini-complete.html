<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kanini Bags — M-Pesa STK Push</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#7C3AED;--pd:#5B21B6;--pl:#F5F3FF;--gold:#D4A853;--dk:#1E1B2E;--bg:#FBFAFF;--sf:#fff;--tx:#2D264B;--mu:#8B83A8;--bd:#EDE9F5;--gn:#059669;--gl:#ECDFF5;--rd:#EF4444;--rl:#FEF2F2;--bl:#3B82F6;--ol:#FFFBEB;--or:#F59E0B;--r:16px;--rs:12px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden}
.navbar{background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:0 clamp(16px,4vw,28px);display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:1000}
.nb{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:1.15rem;font-weight:800;color:var(--dk)}.nb span{color:var(--pri)}
.nl{display:flex;align-items:center;gap:6px;font-size:.84rem}
.nlk{color:var(--mu);padding:7px 12px;border-radius:8px;cursor:pointer;transition:.2s}.nlk:hover{color:var(--pri);background:var(--pl)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pd);box-shadow:0 4px 14px rgba(124,58,237,.25)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#B8860B}
.btn-outline{background:transparent;border:1.5px solid var(--bd);color:var(--tx)}.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:6px 14px;font-size:.78rem}
.hero{background:linear-gradient(135deg,#1E1B2E,#3B2760,#1E1B2E);color:#fff;padding:clamp(36px,6vw,64px)20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,.2),transparent 60%);border-radius:50%}
.hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;position:relative;z-index:1;margin-bottom:10px}
.hero h1 span{background:linear-gradient(90deg,#C4B5FD,#FBBF24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:#94A3B8;max-width:500px;margin:0 auto 22px;position:relative;z-index:1}
.section{padding:clamp(24px,4vw,44px) clamp(16px,3vw,28px);max-width:1100px;margin:0 auto}
.cw{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.cc{padding:7px 18px;border-radius:20px;font-size:.82rem;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--mu);transition:.2s;font-family:inherit}
.cc.active,.cc:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.pc{background:var(--sf);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--bd);transition:.3s;display:flex;flex-direction:column}
.pc:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.pi{width:100%;height:200px;object-fit:cover;background:var(--bg)}
.pb{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:12px;font-size:.65rem;font-weight:700;color:#fff;z-index:2}
.bp{background:var(--gold)}.blw{background:var(--or)}.bo{background:var(--rd)}.bn{background:var(--pri)}
.piw{position:relative}
.pbd{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.pbd h3{font-size:.9rem;font-weight:600;margin-bottom:2px}
.ppc{font-size:.7rem;color:var(--mu);margin-bottom:6px}
.ppr{font-size:1.1rem;font-weight:700;color:var(--pri);margin-top:auto;margin-bottom:3px}
.ps{font-size:.7rem;display:flex;align-items:center;gap:4px;margin-bottom:10px}
.ps.in{color:var(--gn)}.ps.low{color:var(--or)}.ps.out{color:var(--rd)}
.sd{width:5px;height:5px;border-radius:50%;background:currentColor}
